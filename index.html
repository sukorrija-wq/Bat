<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real Bat Upgrade</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#020617, #000);
  overflow: hidden;
}

/* 🌙 Bulan */
.moon {
  position: absolute;
  top: 50px;
  right: 50px;
  width: 80px;
  height: 80px;
  background: #facc15;
  border-radius: 50%;
  box-shadow: 0 0 30px #facc15;
}

/* 🦇 Bat */
.bat {
  position: absolute;
  top: 120px;
  left: -100px;
  animation: fly 8s linear infinite;
}

/* badan */
.body {
  width: 20px;
  height: 12px;
  background: black;
  border-radius: 50%;
  position: relative;
  z-index: 2;
}

/* sayap umum */
.wing {
  position: absolute;
  width: 50px;
  height: 25px;
  background: black;
  top: -8px;
}

/* bentuk sayap kiri */
.wing.left {
  left: -45px;
  clip-path: polygon(100% 50%, 0% 0%, 20% 100%);
  transform-origin: right center;
  animation: flapL 0.35s ease-in-out infinite;
}

/* bentuk sayap kanan */
.wing.right {
  right: -45px;
  clip-path: polygon(0% 50%, 100% 0%, 80% 100%);
  transform-origin: left center;
  animation: flapR 0.35s ease-in-out infinite;
}

/* kepak kiri */
@keyframes flapL {
  0%   { transform: rotate(25deg); }
  50%  { transform: rotate(-50deg); }
  100% { transform: rotate(25deg); }
}

/* kepak kanan (opposite) */
@keyframes flapR {
  0%   { transform: rotate(-25deg); }
  50%  { transform: rotate(50deg); }
  100% { transform: rotate(-25deg); }
}

/* terbang */
@keyframes fly {
  0% { left: -100px; top: 120px; }
  50% { top: 180px; }
  100% { left: 110vw; top: 120px; }
}

</style>
</head>

<body>

<div class="moon"></div>

<!-- 🦇 Bat 1 -->
<div class="bat">
  <div class="wing left"></div>
  <div class="body"></div>
  <div class="wing right"></div>
</div>

<!-- 🦇 Bat 2 -->
<div class="bat" style="animation-delay:2s; top:220px;">
  <div class="wing left"></div>
  <div class="body"></div>
  <div class="wing right"></div>
</div>

<!-- 🦇 Bat 3 -->
<div class="bat" style="animation-delay:4s; top:80px;">
  <div class="wing left"></div>
  <div class="body"></div>
  <div class="wing right"></div>
</div>

</body>
</html>
