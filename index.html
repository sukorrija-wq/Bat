<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pixel Bat</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 🦇 BAT PIXEL */
.bat {
  width: 1px;
  height: 1px;
  position: absolute;
  top: 150px;
  left: 0;
  transform: scale(6);

  animation: fly 6s linear infinite, bat 0.4s steps(1) infinite;
}

/* ✈️ TERBANG */
@keyframes fly {
  from { left: -50px; }
  to { left: 110vw; }
}

/* 🦇 FRAME PIXEL */
@keyframes bat {

  /* FRAME 1 */
  0% {
    box-shadow:
      0 0 #000,
      1px 0 #000, 2px 0 #000,
      -1px 0 #000, -2px 0 #000,
      0 1px #000,
      1px 1px #000, -1px 1px #000;
  }

  /* FRAME 2 (kepak atas) */
  50% {
    box-shadow:
      0 0 #000,
      1px -1px #000, 2px -2px #000,
      -1px -1px #000, -2px -2px #000,
      0 1px #000;
  }

  /* FRAME 3 (kepak bawah) */
  100% {
    box-shadow:
      0 0 #000,
      1px 1px #000, 2px 2px #000,
      -1px 1px #000, -2px 2px #000,
      0 1px #000;
  }
}

</style>
</head>

<body>

<div class="bat"></div>
<div class="bat" style="top:220px; animation-delay:2s;"></div>
<div class="bat" style="top:80px; animation-delay:4s;"></div>

</body>
</html>
