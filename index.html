<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bat Test</title>

<style>
body {
  margin: 0;
  background: black;
}

.bat {
  position: absolute;
  width: 20px;
  height: 20px;
  background: white;
  top: 100px;
  left: 0;
  animation: gerak 5s linear infinite;
}

@keyframes gerak {
  from { left: 0; }
  to { left: 100vw; }
}
</style>

</head>

<body>

<div class="bat"></div>

</body>
</html>
